  city-info:
    ru: "&aГород: &f%city% &8| &aТег: &f%tag% &8| &aЦвет: &f%color% &8| &aУчастники: &f%members%"
    en: "&aCity: &f%city% &8| &aTag: &f%tag% &8| &aColor: &f%color% &8| &aMembers: &f%members%"
  city-list-empty:
