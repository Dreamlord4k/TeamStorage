language: "ru"

storage:
  # Valid values: 9, 18, 27, 36, 45, 54.
  size: 54
  # If the city name is longer than this, GUI titles use the city tag instead.
  title-city-name-max-length: 14
  title:
    ru: "&2Хранилище города: %city_color%%city%"
    en: "&2City Storage: %city_color%%city%"
  # Admin-only command: /teamstorage open [city]
  admin-open-command-enabled: true

menu:
  title:
    ru: "&2Эндер-сундук"
    en: "&2Ender Chest"
  size: 27
  sounds:
    enabled: true
    open: "minecraft:block.ender_chest.open"
    click: "minecraft:ui.button.click"
  items:
    personal:
      slot: 11
      material: "ENDER_CHEST"
      custom-model-data: 0
      name:
        ru: "&aЛичное хранилище"
        en: "&aPersonal Storage"
      lore:
        ru:
          - "&7Открыть обычный эндер-сундук."
        en:
          - "&7Open your vanilla ender chest."
    city:
      slot: 15
      material: "CHEST"
      custom-model-data: 0
      name:
        ru: "&bХранилище города"
        en: "&bCity Storage"
      lore:
        ru:
          - "&7Открыть общее хранилище города."
          - "&8Город: %city_color%%city%"
        en:
          - "&7Open shared city storage."
          - "&8City: %city_color%%city%"

tab:
  # This is the only switch controlling player-list name changes.
  # Disable it when another plugin should have full control over tab names.
  enabled: true
  format:
    ru: "&7[%tag_color%%tag%&7] &f%player%"
    en: "&7[%tag_color%%tag%&7] &f%player%"
  colors:
    green: "&a"
    blue: "&9"
    red: "&c"
    gold: "&6"
    aqua: "&b"
    gray: "&7"
    white: "&f"
    yellow: "&e"
    dark_green: "&2"
    dark_red: "&4"
    purple: "&5"

city-chat:
  enabled: true
  trigger: "@"
  toggle-command-enabled: true
  format:
    ru: "&8[%city_color%%city%&8] &f%player%&7: &f%message%"
    en: "&8[%city_color%%city%&8] &f%player%&7: &f%message%"
  spy:
    enabled: true
    permission: "teamstorage.chat.spy"
    format:
      ru: "&8[&cSpy&8][%city_color%%city%&8] &f%player%&7: &f%message%"
      en: "&8[&cSpy&8][%city_color%%city%&8] &f%player%&7: &f%message%"
  log:
    enabled: true
    file: "city-chat.log"

logging:
  enabled: true
  file: "team-storage.log"

messages:
  prefix:
    ru: "&8[&2TeamStorage&8] &r"
    en: "&8[&2TeamStorage&8] &r"
  only-player:
    ru: "&cЭту команду может использовать только игрок."
    en: "&cOnly players can use this command."
  no-permission:
    ru: "&cУ вас нет прав."
    en: "&cYou do not have permission."
  usage-city:
    ru: "&cИспользование: /city <create|delete|add|remove|info|list|tag|tagcolor>"
    en: "&cUsage: /city <create|delete|add|remove|info|list|tag|tagcolor>"
  usage-city-create:
    ru: "&cИспользование: /city create <name> <tag>"
    en: "&cUsage: /city create <name> <tag>"
  usage-city-delete:
    ru: "&cИспользование: /city delete <name>"
    en: "&cUsage: /city delete <name>"
  usage-city-add:
    ru: "&cИспользование: /city add <player> <city>"
    en: "&cUsage: /city add <player> <city>"
  usage-city-remove:
    ru: "&cИспользование: /city remove <player>"
    en: "&cUsage: /city remove <player>"
  usage-city-info:
    ru: "&cИспользование: /city info <city>"
    en: "&cUsage: /city info <city>"
  usage-city-tag:
    ru: "&cИспользование: /city tag <city> <tag>"
    en: "&cUsage: /city tag <city> <tag>"
  usage-city-tagcolor:
    ru: "&cИспользование: /city tagcolor <city> <color|#hex>"
    en: "&cUsage: /city tagcolor <city> <color|#hex>"
  city-created:
    ru: "&aГород &f%city% &aсоздан. Тег: &f%tag%&a."
    en: "&aCity &f%city% &awas created. Tag: &f%tag%&a."
  city-exists:
